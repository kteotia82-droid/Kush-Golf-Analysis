<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black"/>
<meta name="apple-mobile-web-app-title" content="Scorecard"/>
<meta name="theme-color" content="#080b10"/>

<title>Scorecard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{background:#080b10;color:#e8ecf4;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Inter",sans-serif;overscroll-behavior:none}
#app{display:flex;flex-direction:column;height:100vh;height:100dvh}
#nav-bar{flex-shrink:0;background:#080b10;border-bottom:1px solid #1c2234;padding:12px 18px 8px;display:flex;align-items:center;gap:10px}
#content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
#bottom-nav{flex-shrink:0;background:#0d1018;border-top:1px solid #1c2234;display:flex;padding:8px 0 env(safe-area-inset-bottom,8px)}
.bnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 4px;border:none;background:transparent;cursor:pointer}
.bnav-icon{font-size:19px;line-height:1}
.bnav-label{font-size:10px;font-weight:600;letter-spacing:0.3px;color:#5a6a8a;transition:color 0.15s}
.page{display:none;padding:14px 14px 24px;max-width:960px;margin:0 auto}
.page.active{display:block}
input,select,button{font-family:inherit}
input[type=number]{-moz-appearance:textfield;-webkit-appearance:none}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
select{-webkit-appearance:none}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-thumb{background:#1c2234;border-radius:2px}
.card{background:#0d1120;border:1px solid #1c2234;border-radius:14px;padding:16px;margin-bottom:12px}
.card-sm{background:#131929;border-radius:10px;padding:10px 12px}
.tbl-wrap{overflow-x:auto;border:1px solid #1c2234;border-radius:10px;margin-bottom:16px}
table{width:100%;border-collapse:collapse}
thead{background:#0d1120}
th{padding:8px 10px;text-align:left;font-size:11px;font-weight:700;letter-spacing:0.6px;white-space:nowrap;text-transform:uppercase;color:#7b8faa;border-bottom:1px solid #1c2234}
tbody tr{background:#080c14}
tbody tr:nth-child(even){background:#0a0f1a}
td{padding:8px 10px;font-size:13px;white-space:nowrap;color:#c8d0e4;border-bottom:1px solid #111828}
tbody tr:last-child td{border-bottom:none}
.pill{display:inline-block;min-width:26px;padding:2px 9px;border-radius:20px;font-weight:700;font-size:12px;text-align:center}
.sl{font-size:11px;font-weight:700;color:#5a6a8a;letter-spacing:1.2px;text-transform:uppercase;margin:18px 0 10px;padding-bottom:5px;border-bottom:1px solid #1c2234}
.sl:first-child{margin-top:2px}
.toggle-btn{padding:6px 14px;border-radius:8px;border:1px solid #1c2234;font-size:12px;font-weight:600;color:#5a6a8a;background:#0d1120;cursor:pointer}
.toggle-btn.on{border-color:#4a6eff;background:#162050;color:#a5b8ff}
.insight-card{background:#0d1120;border:1px solid #1c2234;border-radius:12px;padding:14px 16px;display:flex;gap:12px;margin-bottom:10px}
.insight-icon{font-size:22px;flex-shrink:0;line-height:1.3}
.insight-title{font-weight:700;color:#e8ecf4;font-size:14px;margin-bottom:4px}
.insight-body{font-size:12px;color:#8a9ab8;line-height:1.7}
.mi label{display:block;font-size:10px;font-weight:700;color:#5a6a8a;letter-spacing:0.5px;text-transform:uppercase;margin-bottom:4px}
.mi input,.mi select{width:100%;background:#0d1120;border:1px solid #1c2234;border-radius:8px;padding:8px 10px;color:#e8ecf4;font-size:13px}
.par-sel{width:36px;background:#111828;border:1px solid #1c2234;border-radius:4px;color:#6a7a9a;font-size:12px;padding:3px 0;text-align:center}
.score-inp{width:37px;text-align:center;border-radius:8px;font-size:15px;font-weight:800;padding:5px 2px;border:1.5px solid #1c2234;background:#111828;color:#8a9ab8}
</style>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Scorecard modal -->
  <div id="sc-modal" style="display:none;position:fixed;inset:0;z-index:100;background:rgba(4,6,12,0.92);overflow-y:auto;-webkit-overflow-scrolling:touch;backdrop-filter:blur(4px)">

        <button onclick="closeModal()" style="background:#1c2234;border:none;border-radius:8px;color:#e8ecf4;font-size:13px;padding:7px 13px;cursor:pointer;flex-shrink:0;margin-left:10px">&#x2715; Close</button>
      </div>
      <div id="sc-body"></div>
    </div>
  </div>
</div>

// ── SVG CHART ────────────────────────────────────────────────────────────────
function svgChart(active){
  var activeYears=[...new Set(active.map(function(r){return r.year;}))].sort(function(a,b){return a-b;});
  var mode=S.chartMode;
  var yd=activeYears.map(function(yr){
    var rs=active.filter(function(r){return r.year===yr;});
    var n=rs.length;
    var totH=rs.reduce(function(s,r){return s+r.birdie+r.parH+r.bogey+r.dbl+r.trip;},0);
    var cnt=function(k){return rs.reduce(function(s,r){return s+r[k];},0);};
    var vals={year:yr,avg:(rs.reduce(function(s,r){return s+r.strokes;},0)/n).toFixed(1)};
    TK.forEach(function(k){
      vals[k]=mode==="pct"?(totH?Math.round(cnt(k)/totH*100):0):+(cnt(k)/n).toFixed(1);
    });
    return vals;
  });
  var W2=Math.min(($("content")||{clientWidth:380}).clientWidth-28,900)||380;
  var H=200,pL=26,pR=8,pT=20,pB=28,cW=W2-pL-pR,cH=H-pT-pB;
  var bGW=cW/yd.length,bW=Math.min(bGW*0.6,70);
  var maxV=mode==="pct"?100:Math.max.apply(null,yd.map(function(d){return TK.reduce(function(s,k){return s+d[k];},0);})) * 1.1||100;
  var gridVals=[0,25,50,75,100].filter(function(v){return v<=maxV;});
  var grids=gridVals.map(function(v){
    var y=pT+cH-(v/maxV*cH);
    return '<line x1="'+pL+'" x2="'+(W2-pR)+'" y1="'+y+'" y2="'+y+'" stroke="#1e2535" stroke-dasharray="3,3"/>'
      +'<text x="'+(pL-3)+'" y="'+(y+4)+'" text-anchor="end" fill="#374151" font-size="9">'+v+(mode==="pct"?"%":""+"")+'</text>';
  }).join("");
  var bars=yd.map(function(d,i){
    var cx=pL+i*bGW+bGW/2,x=cx-bW/2,yb=pT+cH,rects="";
    TK.forEach(function(k){
      var v=d[k]; if(!v)return;
      var bH=Math.max(v/maxV*cH,1); yb-=bH;
      rects+='<rect x="'+x+'" y="'+yb+'" width="'+bW+'" height="'+bH+'" fill="'+TC[k]+'" rx="2" opacity="0.9"/>';
    });
    var topY=pT+cH-TK.reduce(function(s,k){return s+d[k];},0)/maxV*cH;
    return rects
      +'<text x="'+cx+'" y="'+Math.max(topY-5,pT+10)+'" text-anchor="middle" fill="#e8ecf4" font-size="11" font-weight="700">'+d.avg+'</text>'
      +'<text x="'+cx+'" y="'+(H-8)+'" text-anchor="middle" fill="#6b7a99" font-size="11" font-weight="600">'+d.year+'</text>';
  }).join("");
  var legendHtml=TK.map(function(k){
    return '<div style="display:flex;align-items:center;gap:4px"><div style="width:10px;height:10px;border-radius:2px;background:'+TC[k]+'"></div><span style="font-size:11px;color:#6b7a99">'+TL[k]+'</span></div>';
  }).join("");
  return '<div class="card" style="margin-bottom:14px">'
    +'<div style="display:flex;gap:6px;margin-bottom:10px;align-items:center">'
    +'<span style="font-size:12px;color:#5a6a8a;font-weight:600">View as</span>'
    +'<button class="toggle-btn '+(mode==="pct"?"on":"")+'" onclick="S.chartMode=\'pct\';render()">% of holes</button>'
    +'<button class="toggle-btn '+(mode==="avg"?"on":"")+'" onclick="S.chartMode=\'avg\';render()">avg/round</button>'
    +'</div>'
    +'<svg width="100%" viewBox="0 0 '+W2+' '+H+'" style="display:block">'+grids+bars+'</svg>'
    +'<div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:8px">'+legendHtml+'</div>'
    +'</div>';
}

// ── TREND TABLE (transposed) ──────────────────────────────────────────────────
function trendTable(active){
  var yrs=[...new Set(active.map(function(r){return r.year;}))].sort(function(a,b){return a-b;});
  var yd=yrs.map(function(yr){
    var rs=active.filter(function(r){return r.year===yr;});
    var n=rs.length;
    var av=(rs.reduce(function(s,r){return s+r.strokes;},0)/n).toFixed(1);
    var best=Math.min.apply(null,rs.map(function(r){return r.strokes;}));
    var worst=Math.max.apply(null,rs.map(function(r){return r.strokes;}));
    var totH=rs.reduce(function(s,r){return s+r.birdie+r.parH+r.bogey+r.dbl+r.trip;},0);
    var pcts={};
    TK.forEach(function(t){pcts[t]=totH?Math.round(rs.reduce(function(s,r){return s+r[t];},0)/totH*100):0;});
    return{yr:yr,n:n,av:av,best:best,worst:worst,pcts:pcts};
  });
  var statRows=[
    {label:"Rounds",fn:function(d){return d.n;},fmt:function(v){return'<td style="color:#6a7a9a;padding:8px 10px;font-size:13px">'+v+'</td>';}},
    {label:"Avg",fn:function(d){return parseFloat(d.av);},fmt:function(v,i,arr){
      var best=Math.min.apply(null,arr);var worst=Math.max.apply(null,arr);
      var col=v===best?"#4ade80":v===worst?"#f87171":"#e8ecf4";
      return'<td style="font-size:14px;font-weight:800;padding:8px 10px;color:'+col+'">'+v.toFixed(1)+(v===best?" v":"")+'</td>';
    }},
    {label:"Best",fn:function(d){return d.best;},fmt:function(v,i,arr){
      var b=Math.min.apply(null,arr);
      return'<td style="color:'+(v===b?"#4ade80":"#a0b0c0")+';font-weight:'+(v===b?"700":"400")+';padding:8px 10px;font-size:13px">'+v+'</td>';
    }},
    {label:"Worst",fn:function(d){return d.worst;},fmt:function(v,i,arr){
      var b=Math.min.apply(null,arr);
      return'<td style="color:'+(v===b?"#4ade80":"#f87171")+';padding:8px 10px;font-size:13px">'+v+'</td>';
    }}
  ];
  TK.forEach(function(t){
    statRows.push({label:TL[t]+"%",col:TC[t],fn:function(d){return d.pcts[t];},fmt:function(v,i,arr){
      var prev=arr[i-1];
      var better=t==="birdie"||t==="parH";
      var arrow=prev!==undefined?((better?v>prev:v<prev)?' <span style="font-size:10px;color:#4ade80">&#9650;</span>':(better?v<prev:v>prev)?' <span style="font-size:10px;color:#f87171">&#9660;</span>':""):"";
      return'<td style="padding:8px 10px"><span class="pill" style="background:'+TC[t]+'18;border:1px solid '+TC[t]+'44;color:'+TC[t]+'">'+v+'%</span>'+arrow+'</td>';
    }});
  });
  var header='<tr style="background:#0a0c12"><th style="padding:8px 10px;font-size:11px;color:#5a6a8a;font-weight:700;min-width:80px">Stat</th>'
    +yrs.map(function(yr){return'<th style="padding:8px 10px;font-size:13px;color:#e8ecf4;font-weight:800">'+yr+'</th>';}).join("")+'</tr>';
  var rows=statRows.map(function(row){
    var vals=yd.map(row.fn);
    var cells=vals.map(function(v,i){return row.fmt(v,i,vals);}).join("");
    return'<tr style="border-bottom:1px solid #111828"><td style="padding:8px 10px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:'+(row.col||"#8a9ab8")+'">'+row.label+'</td>'+cells+'</tr>';
  }).join("");
  return'<div class="tbl-wrap"><table style="table-layout:auto"><thead>'+header+'</thead><tbody>'+rows+'</tbody></table></div>';
}

function openScorecard(r){
  S.modalRound = r;
  var pars = getCoursePars(r.course);
  var ci = CI[r.course.trim()] || CI[r.course] || {};
  var verified = !!(COURSE_PARS[r.course.trim()] || COURSE_PARS[r.course]);
  $("sc-title").textContent = r.course.trim();
  $("sc-sub").textContent = r.date
    + (ci.tee ? " \u00b7 " + ci.tee + " tees" : "")
    + (ci.rating ? " \u00b7 Rtg " + ci.rating : "")
    + (ci.slope ? " \u00b7 Slope " + ci.slope : "")
    + (verified ? " \u00b7 pars verified" : " \u00b7 pars estimated");

  function halfCard(label, start){
    var holes = Array.from({length:9}, function(_,i){return start+i;});
    var scores = r.scores || [];
    var tot = holes.reduce(function(s,i){return s+(scores[i]||0);},0);
    var par = holes.reduce(function(s,i){return s+pars[i];},0);
    var d = tot - par;
    var holeRow = holes.map(function(i){
      return '<th style="padding:6px 3px;text-align:center;font-size:11px;color:#374151;font-weight:600">'+(i+1)+'</th>';
    }).join("");
    var parRow = holes.map(function(i){
      return '<td style="padding:5px 3px;text-align:center;font-size:11px;color:#6b7280">'+pars[i]+'</td>';
    }).join("");
    var scoreRow = holes.map(function(i){
      var s = scores[i]||0;
      var t = s>0 ? stype(s,pars[i]) : null;
      var bg = t ? SCL[t] : "transparent";
      var tx = t ? (["eagle","birdie","par"].indexOf(t)>=0 ? "#000" : "#fff") : "#9ca3af";
      return '<td style="padding:4px 2px;text-align:center">'
        +'<div style="display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:6px;background:'+bg+';font-size:14px;font-weight:800;color:'+tx+'">'+(s||"&mdash;")+'</div>'
        +'</td>';
    }).join("");
    return '<div style="margin-bottom:18px">'
      +'<div style="display:flex;align-items:center;gap:8px;margin-bottom:7px">'
      +'<span style="font-size:12px;font-weight:700;color:#374151;text-transform:uppercase;letter-spacing:1px">'+label+'</span>'
      +'<span style="font-size:11px;color:#6b7280">Par '+par+'</span>'
      +(tot?'<span style="margin-left:auto;font-size:13px;font-weight:700;color:'+(d>0?"#c0392b":d<0?"#27ae60":"#2980b9")+'">'+tot+' ('+fmt(d)+')</span>':"")
      +'</div>'
      +'<div style="background:#fff;border:1px solid #d1d9f0;border-radius:10px;overflow:hidden">'
      +'<table style="width:100%;border-collapse:collapse;table-layout:fixed"><colgroup><col style="width:40px">'
      +holes.map(function(){return'<col>';}).join("")+'</colgroup>'
      +'<thead><tr style="background:#e8edf8"><td style="font-size:9px;color:#374151;padding:5px 6px;font-weight:700">HOLE</td>'+holeRow+'</tr>'
      +'<tr style="background:#f1f5fc"><td style="font-size:9px;color:#6b7280;padding:5px 6px;font-weight:600">PAR</td>'+parRow+'</tr></thead>'
      +'<tbody><tr style="background:#fff"><td style="font-size:9px;color:#374151;padding:5px 6px;font-weight:700">SCORE</td>'+scoreRow+'</tr></tbody>'
      +'</table></div></div>';
  }

  var scores = r.scores||[];
  var f9 = scores.slice(0,9).reduce(function(a,b){return a+b;},0);
  var b9 = scores.slice(9).reduce(function(a,b){return a+b;},0);
  var f9p = pars.slice(0,9).reduce(function(a,b){return a+b;},0);
  var b9p = pars.slice(9).reduce(function(a,b){return a+b;},0);

  var totalsBar = '<div style="display:flex;gap:8px;margin-bottom:18px">'
    + [{lb:"Front 9",v:f9,p:f9p},{lb:"Back 9",v:b9,p:b9p},{lb:"Total",v:r.strokes,p:f9p+b9p,big:true}].map(function(x){
      var d=x.v-x.p;
      return '<div style="flex:1;background:'+(x.big?"#1e2a4a":"#e4e9f8")+';border:1px solid '+(x.big?"#4a6eff":"#c8d0e8")+';border-radius:10px;padding:10px 12px">'
        +'<div style="font-size:10px;color:'+(x.big?"#8a9ab8":"#6a7a9a")+';text-transform:uppercase;letter-spacing:0.5px;margin-bottom:3px">'+x.lb+' &middot; Par '+x.p+'</div>'
        +'<div style="font-size:'+(x.big?24:18)+'px;font-weight:800;color:'+(x.big?"#e8ecf4":"#1a2040")+'">'+x.v+'</div>'
        +(x.v?'<div style="font-size:12px;font-weight:700;color:'+(d>0?"#c0392b":d<0?"#27ae60":"#2980b9")+'">'+fmt(d)+'</div>':"")
        +'</div>';
    }).join("")+'</div>';

  var breakdown = '<div style="display:flex;gap:7px;flex-wrap:wrap;margin-bottom:16px">'
    +[{k:"birdie",l:"Birdie",c:"#16a34a"},{k:"parH",l:"Par",c:"#1d4ed8"},{k:"bogey",l:"Bogey",c:"#c2410c"},{k:"dbl",l:"Double",c:"#b91c1c"},{k:"trip",l:"Triple+",c:"#7f1d1d"}]
    .filter(function(x){return r[x.k]>0;})
    .map(function(x){
      return '<div style="background:#fff;border:1.5px solid '+x.c+'55;border-radius:8px;padding:6px 12px;text-align:center">'
        +'<div style="font-size:10px;color:'+x.c+';text-transform:uppercase;letter-spacing:0.5px;font-weight:700">'+x.l+'</div>'
        +'<div style="font-size:20px;font-weight:800;color:'+x.c+'">'+r[x.k]+'</div>'
        +'</div>';
    }).join("")+'</div>';

  var legend = '<div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:4px;padding-top:12px;border-top:1px solid #d1d9f0">'
    +[["Eagle","#fbbf24"],["Birdie","#4ade80"],["Par","#60a5fa"],["Bogey","#fb923c"],["Double","#f87171"],["Triple","#dc2626"]]
    .map(function(x){return '<div style="display:flex;align-items:center;gap:4px"><div style="width:10px;height:10px;border-radius:2px;background:'+x[1]+'"></div><span style="font-size:11px;color:#4b5563">'+x[0]+'</span></div>';})
    .join("")+'</div>';

  // Action buttons for user-added rounds
  var actionBtns = '<div style="display:flex;gap:8px;margin-top:14px">'
    +'<button onclick="editRound(S.modalRound)" '
    +'style="flex:1;padding:11px;border-radius:8px;border:1px solid #4a6eff;background:#162050;color:#a5b8ff;font-size:13px;font-weight:600;cursor:pointer">&#9998; Edit</button>'
    +'<button onclick="deleteRound(S.modalRound)" '
    +'style="flex:1;padding:11px;border-radius:8px;border:1px solid #7f1d1d;background:#1a0808;color:#f87171;font-size:13px;font-weight:600;cursor:pointer">&#128465; Delete</button>'
    +'</div>';

  $("sc-body").innerHTML = '<div style="background:#f0f4ff;border-radius:18px;padding:18px 16px;box-shadow:0 20px 50px rgba(0,0,0,0.5)">'
    + totalsBar + breakdown + halfCard("Front 9",0) + halfCard("Back 9",9) + legend + '</div>' + actionBtns;

  $("sc-modal").style.display = "block";
  document.body.style.overflow = "hidden";
}

// ── AI SCORECARD PARSER ───────────────────────────────────────────────────────
function selectPhoto(){
  $("sc_file_input").click();
}

function onPhotoSelected(){
  var input = $("sc_file_input");
  if(!input||!input.files||!input.files[0]) return;
  S.uploadFile = input.files[0];
  S.uploadState = "photo_selected";
  S.uploadParsed = null;
  S.uploadError = "";
  setTab("enter");
}

function runParse(){
  if(!S.uploadFile){
    S.uploadState = "error";
    S.uploadError = "No photo found. Please go back and choose a photo.";
    render(); return;
  }
  // Read API key from inline input if not set
  if(!S.apiKey){
    var el = $("api_key_input");
    var v = el ? el.value.trim() : "";
    if(!v){
      S.uploadState = "needs_key";
      render(); return;
    }
    S.apiKey = v;
    localStorage.setItem("golf_api_key", v);
  }
  S.uploadState = "parsing";
  render();
  doParseAsync();
}

async function doParseAsync(){
  try {
    var b64 = await new Promise(function(res,rej){
      var reader = new FileReader();
      reader.onload = function(){ res(reader.result.split(",")[1]); };
      reader.onerror = rej;
      reader.readAsDataURL(S.uploadFile);
    });
    var mediaType = S.uploadFile.type||"image/jpeg";

    var prompt = "You are reading a golf scorecard photograph.\n\n"
      + "Extract exactly these three things:\n"
      + "1. COURSE NAME - printed at the top of the scorecard\n"
      + "2. PAR ROW - the row labelled PAR showing the par value (3, 4, or 5) for each hole\n"
      + "3. SCORE ROW - the row showing the player gross stroke count per hole\n\n"
      + "Golf scorecards typically show holes 1-9 on one half and holes 10-18 on the other half, "
      + "or they may show all 18 in a row. The PAR row and SCORE row each have 9 or 18 numbers.\n\n"
      + "Return ONLY this JSON - no other text:\n"
      + "{\n"
      + "  \"course\": \"exact course name\",\n"
      + "  \"date\": \"YYYY-MM-DD or null\",\n"
      + "  \"pars\": [4,4,3,5,4,4,3,4,5,4,4,3,5,4,4,3,4,5],\n"
      + "  \"scores\": [5,5,4,6,5,5,4,5,6,5,5,4,7,5,5,4,5,6],\n"
      + "  \"notes\": \"note any holes you could not read clearly\"\n"
      + "}\n\n"
      + "CRITICAL RULES:\n"
      + "- pars array: exactly 18 integers, each must be 3, 4, or 5\n"
      + "- scores array: exactly 18 integers, typically 2-12 per hole\n"
      + "- Use 0 for any hole you cannot read\n"
      + "- Do NOT include handicap-adjusted or net scores, only raw gross strokes";

    var resp = await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "x-api-key":S.apiKey,
        "anthropic-version":"2023-06-01",
        "anthropic-dangerous-direct-browser-access":"true"
      },
      body:JSON.stringify({
        model:"claude-sonnet-4-6",
        max_tokens:1500,
        messages:[{
          role:"user",
          content:[
            {type:"image",source:{type:"base64",media_type:mediaType,data:b64}},
            {type:"text",text:prompt}
          ]
        }]
      })
    });

    if(!resp.ok){
      var eb={};try{eb=await resp.json();}catch(e2){}
      throw new Error("API " + resp.status + ": " + ((eb.error&&eb.error.message)||resp.statusText));
    }

    var data = await resp.json();
    var rawText = "";
    if(data.content){
      for(var i=0;i<data.content.length;i++){
        if(data.content[i].type==="text"){rawText=data.content[i].text;break;}
      }
    }

    // Extract JSON block
    var js = rawText.indexOf("{");
    var je = rawText.lastIndexOf("}");
    if(js<0||je<0) throw new Error("No JSON found. Response was: " + rawText.slice(0,200));
    var parsed = JSON.parse(rawText.slice(js,je+1));

    // Validate
    if(!Array.isArray(parsed.pars)||parsed.pars.length!==18)
      throw new Error("Expected 18 pars, got " + (parsed.pars?parsed.pars.length:"none") + ". Try a clearer/closer photo.");
    if(!Array.isArray(parsed.scores)||parsed.scores.length!==18)
      throw new Error("Expected 18 scores, got " + (parsed.scores?parsed.scores.length:"none") + ". Try a clearer/closer photo.");

    parsed.pars   = parsed.pars.map(function(p){var n=parseInt(p);return(n>=3&&n<=5)?n:4;});
    parsed.scores = parsed.scores.map(function(s){return parseInt(s)||0;});

    S.uploadParsed = parsed;
    S.uploadState  = "parsed";

    // Pre-fill entry round
    var rd = S.entryRound;
    rd.scores = parsed.scores.map(String);
    rd.pars   = parsed.pars;
    if(parsed.course && parsed.course!=="null") rd.course = parsed.course;
    if(parsed.date   && parsed.date!=="null")   rd.date   = parsed.date;
    S.entryRound = rd;

    render();

  } catch(e) {
    S.uploadState = "error";
    S.uploadError = e.message || "Parse failed";
    render();
  }
}

function resetUpload(){
  S.uploadState = "idle";
  S.uploadFile  = null;
  S.uploadParsed= null;
  S.uploadError = "";
  render();
}


function editRound(r) {
  if(!r) return;
  // Load round into entry form
  var ci = CI[r.course.trim()] || CI[r.course] || {};
  S.entryRound = {
    id: r.date + "__edit",
    course: r.course.trim(),
    date: r.date,
    slope: ci.slope ? String(ci.slope) : "",
    rating: ci.rating ? String(ci.rating) : "",
    pars: getCoursePars(r.course),
    scores: (r.scores || Array(18).fill(0)).map(String),
    _editing: r   // keep reference to original for delete-then-resave
  };
  resetUpload();
  closeModal();
  S.tab = "enter";
  render();
}

function deleteRound(r) {
  if(!r) return;
  if(!confirm("Delete this round?\n" + r.course.trim() + " — " + r.date + " (" + r.strokes + " strokes)")) return;
  // Remove from in-memory ALL array
  var idx = ALL.findIndex(function(x){ return x.date===r.date && x.course.trim()===r.course.trim() && x.strokes===r.strokes; });
  if(idx !== -1) ALL.splice(idx, 1);
  // Remove from user-added localStorage (if it was user-added)
  try {
    var saved = JSON.parse(localStorage.getItem("golf_rounds")||"[]");
    saved = saved.filter(function(x){ return !(x.date===r.date && x.course.trim()===r.course.trim() && x.strokes===r.strokes); });
    localStorage.setItem("golf_rounds", JSON.stringify(saved));
  } catch(e){}
  // Track deleted historical rounds so they don't reload next session
  try {
    var deleted = JSON.parse(localStorage.getItem("golf_deleted")||"[]");
    deleted.push({date:r.date, course:r.course.trim(), strokes:r.strokes});
    localStorage.setItem("golf_deleted", JSON.stringify(deleted));
  } catch(e){}
  closeModal();
  render();
}



function toggleCourseCard(key) {
  window[key] = window[key] === false ? true : false;
  render();
}

function saveCourseInfo(courseName) {
  var safe = courseName.replace(/\W/g,"");
  var slopeEl  = document.getElementById("slope_"  + safe);
  var ratingEl = document.getElementById("rating_" + safe);
  var slope  = slopeEl  ? parseFloat(slopeEl.value)  : NaN;
  var rating = ratingEl ? parseFloat(ratingEl.value) : NaN;
  if(isNaN(slope) && isNaN(rating)) { alert("Enter at least slope or rating."); return; }
  if(!CI[courseName]) CI[courseName] = {};
  if(!isNaN(slope))  CI[courseName].slope  = slope;
  if(!isNaN(rating)) CI[courseName].rating = rating;
  // Persist
  try {
    var ciUpdates = JSON.parse(localStorage.getItem("golf_ci_updates")||"{}");
    if(!ciUpdates[courseName]) ciUpdates[courseName] = {};
    if(!isNaN(slope))  ciUpdates[courseName].slope  = slope;
    if(!isNaN(rating)) ciUpdates[courseName].rating = rating;
    localStorage.setItem("golf_ci_updates", JSON.stringify(ciUpdates));
  } catch(e){}
  render();
}

function confirmEntry(){
  var rd = S.entryRound;
  var scores = rd.scores.map(function(s){return parseInt(s)||0;});
  var total = scores.reduce(function(a,b){return a+b;},0);
  var filled = scores.filter(function(s){return s>0;}).length;

  if(!rd.course){alert("Please enter a course name."); return;}
  if(!rd.date){alert("Please enter a date."); return;}
  if(filled<18){
    if(!confirm("Only "+filled+"/18 holes filled. Save anyway?")) return;
  }

  var pars = rd.pars||DP;
  var birdie=0,parH=0,bogey=0,dbl=0,trip=0;
  scores.forEach(function(s,i){
    if(!s)return;
    var d=s-pars[i];
    if(d<=-1)birdie++;else if(d===0)parH++;else if(d===1)bogey++;else if(d===2)dbl++;else trip++;
  });
  var newRound = {
    year:parseInt(rd.date.slice(0,4)), userAdded:true,
    date:rd.date,
    course:rd.course.trim(),
    strokes:total,
    f9:scores.slice(0,9).reduce(function(a,b){return a+b;},0),
    b9:scores.slice(9).reduce(function(a,b){return a+b;},0),
    scores:scores,
    birdie:birdie,parH:parH,bogey:bogey,dbl:dbl,trip:trip
  };

  // If editing an existing round, remove the old one first
  if(rd._editing) {
    var eIdx = ALL.findIndex(function(x){ return x.date===rd._editing.date && x.course.trim()===rd._editing.course.trim() && x.userAdded; });
    if(eIdx !== -1) ALL.splice(eIdx, 1);
    try {
      var eSaved = JSON.parse(localStorage.getItem("golf_rounds")||"[]");
      eSaved = eSaved.filter(function(x){ return !(x.date===rd._editing.date && x.course.trim()===rd._editing.course.trim()); });
      localStorage.setItem("golf_rounds", JSON.stringify(eSaved));
    } catch(e){}
  }

  ALL.push(newRound);
  ALL.sort(function(a,b){return a.date.localeCompare(b.date);});

  // Update CI with slope/rating if user entered them
  if(rd.slope || rd.rating) {
    var cn = rd.course.trim();
    if(!CI[cn]) CI[cn] = {};
    if(rd.slope)  CI[cn].slope  = parseFloat(rd.slope);
    if(rd.rating) CI[cn].rating = parseFloat(rd.rating);
    // Persist CI updates
    try {
      var ciUpdates = JSON.parse(localStorage.getItem("golf_ci_updates")||"{}");
      if(!ciUpdates[cn]) ciUpdates[cn] = {};
      if(rd.slope)  ciUpdates[cn].slope  = parseFloat(rd.slope);
      if(rd.rating) ciUpdates[cn].rating = parseFloat(rd.rating);
      localStorage.setItem("golf_ci_updates", JSON.stringify(ciUpdates));
    } catch(e){}
  }

  try {
    var saved=JSON.parse(localStorage.getItem("golf_rounds")||"[]");
    saved.push(newRound);
    localStorage.setItem("golf_rounds",JSON.stringify(saved));
  } catch(e){}

  // Reset form
  S.entryRound={id:Date.now(),course:"",date:"",slope:"",rating:"",pars:[...DP],scores:Array(18).fill("")};
  resetUpload();
  S.tab="yearly";
  render();
  alert("Round saved! " + rd.course + " — " + total + " strokes on " + rd.date);
}

function updateEntryField(field, val){
  S.entryRound[field] = val;
  if(field==="course"){
    var c=CI[val]||CI[(val||"").trim()]||{};

    if(ti) ti.textContent = c.tee ? "\ud83d\udccc "+c.tee+" tees \u00b7 "+(c.yards||0).toLocaleString()+" yds" : "";
  }
  // No render() — keep focus
}

function updateEntryScore(hi, val){
  S.entryRound.scores[hi]=val;
  // Surgically update this cell color
  var sv=parseInt(val);
  var t=(!isNaN(sv)&&sv>0)?stype(sv,S.entryRound.pars[hi]):null;
  var inp=document.querySelector("[data-shi='"+hi+"']");
  if(inp){
    inp.style.background = t ? SCL[t]+"dd" : "#111828";
    inp.style.color      = t ? (["eagle","birdie","par"].indexOf(t)>=0?"#000":"#fff") : "#6a7a9a";
    inp.style.borderColor= t ? SCL[t] : "#1c2234";
  }
  updateEntryTotals();
}

function updateEntryPar(hi, val){
  S.entryRound.pars[hi]=parseInt(val);
  // Re-color the score for this hole
  var sv=parseInt(S.entryRound.scores[hi]);
  var t=(!isNaN(sv)&&sv>0)?stype(sv,S.entryRound.pars[hi]):null;
  var inp=document.querySelector("[data-shi='"+hi+"']");
  if(inp){
    inp.style.background = t ? SCL[t]+"dd" : "#111828";
    inp.style.color      = t ? (["eagle","birdie","par"].indexOf(t)>=0?"#000":"#fff") : "#6a7a9a";
    inp.style.borderColor= t ? SCL[t] : "#1c2234";
  }
  updateEntryTotals();
}

function updateEntryTotals(){
  var rd=S.entryRound;
  var sc=rd.scores.map(function(s){return parseInt(s)||0;});
  var f9=sc.slice(0,9).reduce(function(a,b){return a+b;},0);
  var b9=sc.slice(9).reduce(function(a,b){return a+b;},0);
  var tot=f9+b9;
  var f9p=rd.pars.slice(0,9).reduce(function(a,b){return a+b;},0);
  var b9p=rd.pars.slice(9).reduce(function(a,b){return a+b;},0);
  function setEl(id,text,color){var el=document.getElementById(id);if(el){el.textContent=text;if(color)el.style.color=color;}}
  setEl("et_f9", f9||"");
  setEl("et_b9", b9||"");
  setEl("et_tot",tot||"");
  setEl("et_f9d", f9?fmt(f9-f9p):"", f9?diffColor(f9-f9p):"");
  setEl("et_b9d", b9?fmt(b9-b9p):"", b9?diffColor(b9-b9p):"");
  setEl("et_totd",tot?fmt(tot-f9p-b9p):"", tot?diffColor(tot-f9p-b9p):"");
}

function renderEnter(){
  var rd = S.entryRound;
  var ci = CI[rd.course]||CI[(rd.course||"").trim()]||{};

  // Upload wizard section
  var uploadSection = buildUploadSection();

  // Scorecard grid
  function halfGrid(label, start){
    var holes=Array.from({length:9},function(_,i){return start+i;});
    var hs=holes.reduce(function(s,i){return s+(parseInt(rd.scores[i])||0);},0);
    var hp=holes.reduce(function(s,i){return s+rd.pars[i];},0);
    var parRow=holes.map(function(i){
      return '<td style="text-align:center;padding:2px">'
        +'<select class="par-sel" onchange="updateEntryPar('+i+',this.value)">'
        +'<option '+(rd.pars[i]===3?"selected":"")+' value="3">3</option>'
        +'<option '+(rd.pars[i]===4?"selected":"")+' value="4">4</option>'
        +'<option '+(rd.pars[i]===5?"selected":"")+' value="5">5</option>'
        +'</select></td>';
    }).join("");
    var scoreRow=holes.map(function(i){
      var sv=parseInt(rd.scores[i]);
      var t=(!isNaN(sv)&&sv>0)?stype(sv,rd.pars[i]):null;
      var bg=t?SCL[t]+"dd":"#111828";
      var tx=t?(["eagle","birdie","par"].indexOf(t)>=0?"#000":"#fff"):"#6a7a9a";
      var bd=t?SCL[t]:"#1c2234";
      return '<td style="text-align:center;padding:3px 2px">'
        +'<input type="number" min="1" max="15" value="'+(rd.scores[i]||"")+'" '
        +'data-shi="'+i+'" oninput="updateEntryScore('+i+',this.value)" class="score-inp" '
        +'style="background:'+bg+';color:'+tx+';border-color:'+bd+'">'
        +'</td>';
    }).join("");
    return '<div style="margin-bottom:14px">'
      +'<div style="display:flex;align-items:center;gap:8px;margin-bottom:5px">'
      +'<span style="font-size:11px;font-weight:700;color:#5a6a8a;text-transform:uppercase;letter-spacing:1px">'+label+'</span>'
      +'<span style="font-size:11px;color:#2d3a50">Par '+hp+'</span>'
      +(hs>0?'<span style="margin-left:auto;font-size:13px;font-weight:700;color:'+diffColor(hs-hp)+'">'+hs+' ('+fmt(hs-hp)+')</span>':"")
      +'</div>'
      +'<div style="overflow-x:auto"><table style="border-collapse:collapse;table-layout:fixed;width:100%;min-width:440px">'
      +'<colgroup><col style="width:44px">'+holes.map(function(){return'<col style="width:42px">';}).join("")+'</colgroup>'
      +'<thead>'
      +'<tr><td style="font-size:10px;color:#2d3a50;padding:3px 4px;font-weight:700">HOLE</td>'
      +holes.map(function(i){return'<td style="text-align:center;font-size:11px;color:#5a6a8a;font-weight:700;padding:3px 0">'+(i+1)+'</td>';}).join("")+'</tr>'
      +'<tr><td style="font-size:10px;color:#2d3a50;padding:2px 4px">PAR</td>'+parRow+'</tr>'
      +'</thead>'
      +'<tbody><tr><td style="font-size:10px;color:#2d3a50;padding:4px;font-weight:700">SCORE</td>'+scoreRow+'</tr></tbody>'
      +'</table></div></div>';
  }

  var f9=rd.scores.slice(0,9).reduce(function(a,v){return a+(parseInt(v)||0);},0);
  var b9=rd.scores.slice(9).reduce(function(a,v){return a+(parseInt(v)||0);},0);
  var tot=f9+b9;
  var f9p=rd.pars.slice(0,9).reduce(function(a,b){return a+b;},0);
  var b9p=rd.pars.slice(9).reduce(function(a,b){return a+b;},0);
  var tp=f9p+b9p;

  var totalsRow='<div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap">'
    +[{lb:"Front 9",v:f9,p:f9p,vid:"et_f9",did:"et_f9d"},{lb:"Back 9",v:b9,p:b9p,vid:"et_b9",did:"et_b9d"},{lb:"Total",v:tot,p:tp,big:true,vid:"et_tot",did:"et_totd"}].map(function(x){
      var d=x.v-x.p;
      return '<div style="flex:1;min-width:80px;background:'+(x.big?"#0d1120":"#111828")+';border:1px solid '+(x.big?"#4a6eff":"#1c2234")+';border-radius:10px;padding:10px 12px">'
        +'<div style="font-size:10px;color:#5a6a8a;margin-bottom:3px;text-transform:uppercase;letter-spacing:0.5px">'+x.lb+' &middot; Par '+x.p+'</div>'
        +'<div style="font-size:'+(x.big?24:18)+'px;font-weight:800;color:#e8ecf4" id="'+x.vid+'">'+(x.v||"&mdash;")+'</div>'
        +(x.v>0?'<div style="font-size:12px;font-weight:700;color:'+diffColor(d)+'" id="'+x.did+'">'+fmt(d)+'</div>':'<div style="font-size:12px" id="'+x.did+'"></div>')
        +'</div>';
    }).join("")+'</div>';

  var metaSection = '<div style="display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:8px;margin-bottom:'+(ci.tee?"6":"14")+'px">'
    +'<div class="mi"><label>Course</label>'
    +'<input type="text" id="entry_course" value="'+(rd.course||"")+'" placeholder="Course name" oninput="updateEntryField(\'course\',this.value)"></div>'
    +'<div class="mi"><label>Date</label>'
    +'<input type="date" id="entry_date" value="'+(rd.date||"")+'" onchange="updateEntryField(\'date\',this.value)"></div>'
    +'<div class="mi"><label>Slope</label>'
    +'<input type="number" id="entry_slope" step="0.1" value="'+(rd.slope||"")+'" placeholder="'+(ci.slope||113)+'" oninput="updateEntryField(\'slope\',this.value)"></div>'
    +'<div class="mi"><label>Rating</label>'
    +'<input type="number" id="entry_rating" step="0.1" value="'+(rd.rating||"")+'" placeholder="'+(ci.rating||72)+'" oninput="updateEntryField(\'rating\',this.value)"></div>'
    +'</div>'
    +'<div id="entry_tee" style="font-size:11px;color:#5a6a8a;margin-bottom:12px">'
    +(ci.tee?"\ud83d\udccc "+ci.tee+" tees \u00b7 "+(ci.yards||0).toLocaleString()+" yds":"")
    +'</div>';

  var confirmBtn = S.uploadState==="parsed" ? ""
    : '<button onclick="confirmEntry()" style="width:100%;margin-top:10px;padding:13px;border-radius:10px;border:none;background:linear-gradient(135deg,#4a6eff,#6a4eff);color:#fff;font-size:14px;font-weight:700;cursor:pointer">&#10003; Confirm &amp; Save Entry</button>';

  return uploadSection + metaSection + halfGrid("Front 9",0) + halfGrid("Back 9",9) + totalsRow + confirmBtn;
}

      +'<div style="font-size:12px;color:#5a6a8a;margin-bottom:10px">&#128444; '+(S.uploadFile?S.uploadFile.name:"")+'</div>'

      +'<div style="display:flex;gap:8px">'
      +'<button onclick="resetUpload()" style="flex:1;padding:11px;border-radius:8px;border:1px solid #1c2234;background:transparent;color:#5a6a8a;font-size:13px;font-weight:600;cursor:pointer">&#8592; Back</button>'
      +'<button onclick="runParse()" style="flex:2;padding:12px;border-radius:8px;border:none;background:#4a6eff;color:#fff;font-size:14px;font-weight:700;cursor:pointer">Parse Scorecard &#8594;</button>'

  if(S.uploadState==="error"){

      +'<div style="background:#1a0608;border:1px solid #f8717144;border-radius:12px;padding:14px;margin-bottom:14px">'
      +'<div style="font-size:13px;font-weight:700;color:#f87171;margin-bottom:6px">&#10007; Parse failed</div>'
      +'<div style="font-size:12px;color:#c08080;margin-bottom:10px;word-break:break-word">'+(S.uploadError||"Unknown error")+'</div>'
      +'<button onclick="S.uploadState=\'photo_selected\';render()" style="width:100%;padding:10px;border-radius:8px;border:1px solid #f87171;background:transparent;color:#f87171;font-size:13px;font-weight:600;cursor:pointer;margin-bottom:6px">Try Again</button>'
      +'<button onclick="resetUpload()" style="width:100%;padding:9px;border-radius:8px;border:1px solid #1c2234;background:transparent;color:#5a6a8a;font-size:12px;cursor:pointer">Choose Different Photo</button>'
      +'</div>';
  }
  return '<input type="file" id="sc_file_input" accept="image/*" style="display:none" onchange="onPhotoSelected()">';
}

var _golfMap = null;

function toggleWorldMap(){
  S.mapOpen = !S.mapOpen;
  render();
  if(S.mapOpen){
    // Leaflet is already loaded via <head> — just build the map
    setTimeout(buildLeafletMap, 100);
  }
}

function buildLeafletMap(){
  // Destroy stale instance
  if(_golfMap){ try{ _golfMap.remove(); }catch(e){} _golfMap = null; }

  var canvas = document.getElementById("world_map_canvas");
  if(!canvas){ return; }
  if(!window.L){
    canvas.innerHTML = '<div style="height:100%;display:flex;align-items:center;justify-content:center;color:#f87171;font-size:12px;padding:20px;text-align:center">Map library not loaded. Connect to internet and reload the app.</div>';
    return;
  }

  canvas.innerHTML = "";

  try {
    _golfMap = window.L.map(canvas, {
      center:[28,15], zoom:2,
      zoomControl:true,
      attributionControl:false,
      preferCanvas:true
    });
  } catch(e) {
    canvas.innerHTML = '<div style="height:100%;display:flex;align-items:center;justify-content:center;color:#f87171;font-size:12px;padding:20px;text-align:center">Map error: '+e.message+'</div>';
    return;
  }

  window.L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{
    maxZoom:18, opacity:0.9
  }).addTo(_golfMap);

  // Round counts per course
  var counts={};
  ALL.forEach(function(r){ var cn=r.course.trim(); counts[cn]=(counts[cn]||0)+1; });

  var CONT_POS={
    "N. America":{lat:40,lng:-97},
    "Europe":    {lat:54,lng:-3},
    "Asia":      {lat:14,lng:101},
    "Oceania":   {lat:-34,lng:151}
  };

  function bIcon(label,n,col){
    var sz=Math.max(40,Math.min(68,30+n*3));
    return window.L.divIcon({
      html:'<div style="width:'+sz+'px;height:'+sz+'px;border-radius:50%;background:'+col
        +';border:2px solid rgba(255,255,255,0.6);display:flex;align-items:center;'
        +'justify-content:center;flex-direction:column;box-shadow:0 2px 8px rgba(0,0,0,0.45)">'
        +'<div style="font-size:'+Math.round(sz/3.4)+'px;font-weight:800;color:#fff;line-height:1">'+n+'</div>'
        +'<div style="font-size:7px;color:rgba(255,255,255,0.85);text-align:center;padding:0 2px;overflow:hidden;max-width:'+(sz-4)+'px">'+label+'</div>'
        +'</div>',
      className:"",iconSize:[sz,sz],iconAnchor:[sz/2,sz/2]
    });
  }

  function pinIcon(n){
    var b=n>1?'<div style="position:absolute;top:-6px;right:-8px;background:#f59e0b;color:#000;border-radius:8px;font-size:9px;font-weight:800;padding:1px 4px;border:1px solid #fff">'+n+'x</div>':"";
    return window.L.divIcon({
      html:'<div style="position:relative;width:26px;height:32px">'
        +'<div style="position:absolute;bottom:0;left:2px;width:20px;height:20px;background:#4a6eff'
        +';border:2.5px solid #fff;border-radius:50% 50% 50% 0;transform:rotate(-45deg)'
        +';box-shadow:0 2px 5px rgba(0,0,0,0.5)"></div>'+b+'</div>',
      className:"",iconSize:[26,32],iconAnchor:[8,32]
    });
  }

  var activeLG=null;
  function refresh(){
    if(activeLG){ try{_golfMap.removeLayer(activeLG);}catch(e){} activeLG=null; }
    if(!_golfMap) return;
    var z=_golfMap.getZoom();
    var lg=window.L.layerGroup().addTo(_golfMap);
    activeLG=lg;
    var b={};

    if(z<4){
      Object.keys(counts).forEach(function(cn){
        var g=GEO[cn];if(!g)return;
        var k=g.cont,p=CONT_POS[k]||{lat:g.lat,lng:g.lng};
        b[k]=b[k]||{n:0,lat:p.lat,lng:p.lng};b[k].n+=counts[cn];
      });
      Object.keys(b).forEach(function(k){
        window.L.marker([b[k].lat,b[k].lng],{icon:bIcon(k,b[k].n,"#7c3aed")}).addTo(lg);
      });
    } else if(z<6){
      Object.keys(counts).forEach(function(cn){
        var g=GEO[cn];if(!g)return;
        b[g.country]=b[g.country]||{n:0,lat:g.lat,lng:g.lng};b[g.country].n+=counts[cn];
      });
      Object.keys(b).forEach(function(k){
        window.L.marker([b[k].lat,b[k].lng],{icon:bIcon(k,b[k].n,"#0369a1")}).addTo(lg);
      });
    } else if(z<9){
      Object.keys(counts).forEach(function(cn){
        var g=GEO[cn];if(!g)return;
        var k=g.state&&g.country==="USA"?g.state+" (USA)":g.country;
        b[k]=b[k]||{n:0,lat:g.lat,lng:g.lng};b[k].n+=counts[cn];
      });
      Object.keys(b).forEach(function(k){
        window.L.marker([b[k].lat,b[k].lng],{icon:bIcon(k,b[k].n,"#0284c7")}).addTo(lg);
      });
    } else {
      Object.keys(counts).forEach(function(cn){
        var g=GEO[cn];if(!g)return;
        var n=counts[cn];
        var m=window.L.marker([g.lat,g.lng],{icon:pinIcon(n)});
        m.bindPopup("<b>"+cn+"</b><br><small style='color:#888'>"+( g.city?g.city+", ":"")+(g.state||g.country)+"</small><br>"+n+" round"+(n!==1?"s":""),{maxWidth:200});
        lg.addLayer(m);
      });
    }
  }

  _golfMap.on("zoomend moveend",refresh);
  refresh();
  setTimeout(function(){if(_golfMap)_golfMap.invalidateSize();},150);
}


function setTab(t){ S.tab=t; render(); }

function render(){
  var active = getActive();
  var allYears = [...new Set(active.map(function(r){return r.year;}))].sort(function(a,b){return b-a;});

  // Nav label highlights
  ["home","yearly","insights","courses","rounds","enter"].forEach(function(t){
    var el = $("lbl-"+t);
    if(el) el.style.color = S.tab===t ? "#7b9cff" : "#5a6a8a";
  });
  $("nav-sub").textContent = ALL.length + " rounds \u00b7 2023\u20132026";

  // Hide all pages
  document.querySelectorAll(".page").forEach(function(p){p.classList.remove("active");});

  if(S.tab==="enter"){
    $("page-enter").innerHTML = renderEnter();
    $("page-enter").classList.add("active");

  } else if(S.tab==="home"){
    var CY = 2026;
    var cy = ALL.filter(function(r){return r.year===CY;});
    var cyN = cy.length;
    var cyAvg = cyN ? (cy.reduce(function(s,r){return s+r.strokes;},0)/cyN).toFixed(1) : "--";
    var cyBest = cyN ? Math.min.apply(null,cy.map(function(r){return r.strokes;})) : "--";
    var cyH = cy.reduce(function(s,r){return s+r.birdie+r.parH+r.bogey+r.dbl+r.trip;},0);
    var cyBPct = cyH ? Math.round(cy.reduce(function(s,r){return s+r.birdie;},0)/cyH*100) : 0;
    var cyBogPct = cyH ? Math.round(cy.reduce(function(s,r){return s+r.bogey;},0)/cyH*100) : 0;
    var cyDPct = cyH ? Math.round(cy.reduce(function(s,r){return s+r.dbl+r.trip;},0)/cyH*100) : 0;
    var courseCounts={};
    ALL.forEach(function(r){var cn=r.course.trim();courseCounts[cn]=(courseCounts[cn]||0)+1;});
    var sortedCourses=Object.entries(courseCounts).sort(function(a,b){return b[1]-a[1];}).map(function(e){return{name:e[0],n:e[1]};});
    var courseOpts=sortedCourses.map(function(c){return'<option value="'+c.name.replace(/"/g,"&quot;")+'">'+(c.name.length>35?c.name.slice(0,35)+"...":c.name)+' ('+c.n+'x)</option>';}).join("");
    // Last 3 rounds thumbnails
    // Map stats
    var geoRounds = ALL.filter(function(r){return !!GEO[r.course.trim()];});
    var mapCountries = new Set(geoRounds.map(function(r){return GEO[r.course.trim()].country;}));
    var mapUSStates  = new Set(geoRounds.filter(function(r){return GEO[r.course.trim()].country==="USA";}).map(function(r){return GEO[r.course.trim()].state;}));
    var mapCountriesN = mapCountries.size;
    var mapUSStatesN  = mapUSStates.size;

    // World map stats
    var geoCountries=new Set(), geoUSStates=new Set(), geoContinents=new Set();
    ALL.forEach(function(r){
      var g=GEO[r.course.trim()]||GEO[r.course];
      if(!g) return;
      geoCountries.add(g.country);
      geoContinents.add(g.cont);
      if(g.state&&g.country==="USA") geoUSStates.add(g.state);
    });
    var uniqueCountries=geoCountries.size;
    var uniqueUSStates=geoUSStates.size;
    var uniqueContinents=geoContinents.size;

    var last3 = ALL.slice().sort(function(a,b){return b.date.localeCompare(a.date);}).slice(0,3);
    var lastThreeRounds = last3.length ? (
      '<div style="margin-bottom:12px"><div style="font-size:11px;font-weight:700;color:#5a6a8a;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px">Recent Rounds</div>'
      +'<div style="display:flex;gap:8px">'
      +last3.map(function(r){
        var pars=getCoursePars(r.course);

        +'<span style="font-size:11px;font-weight:700;padding:2px 7px;border-radius:5px;background:'+dc+'18;border:1px solid '+dc+'44;color:'+dc+'">'+d+'</span>'
        +'<span style="color:#3a4a60;font-size:14px">'+(collapsed?"&#9660;":"&#9650;")+'</span>'
        +'</div></div>'
        +body+'</div>';
    }

    // Group by difficulty, sort multi-round first
    ["Hard","Medium","Easy","Unknown"].filter(function(d){return courses.some(function(c){return c.diff===d;});}).forEach(function(d){
      var dc=DC[d];
      var list=courses.filter(function(c){return c.diff===d;}).sort(function(a,b){return b.n-a.n||a.av-b.av;});
      var allRds=list.reduce(function(a,c){return a.concat(c.rounds);},[]); 
      var nRds=allRds.length;
      var avScore=nRds?(allRds.reduce(function(s,r){return s+r.strokes;},0)/nRds).toFixed(1):"--";
      var bestScore=nRds?Math.min.apply(null,allRds.map(function(r){return r.strokes;})):"--";
      var collapsed=S.collapsedDiff[d];
      var body=collapsed?"":'<div style="padding:0 12px 12px">'+list.map(courseCard).join("")+'</div>';
      html+='<div style="background:#0d1120;border:1px solid #1c2234;border-left:3px solid '+dc+';border-radius:12px;margin-bottom:10px;overflow:hidden">'
        +'<div onclick="S.collapsedDiff[\''+d+'\']=!S.collapsedDiff[\''+d+'\'];render()" style="display:flex;align-items:center;padding:14px;cursor:pointer;background:#0f1420">'
        +'<div style="flex:1"><span style="font-size:16px;font-weight:800;color:'+dc+'">'+d+'</span>'
        +'<span style="font-size:12px;color:#5a6a8a;margin-left:10px">'+list.length+' courses &middot; '+nRds+' rounds</span></div>'
        +'<div style="text-align:right;margin-right:10px"><div style="font-size:12px;color:#e8ecf4">avg '+avScore+'</div><div style="font-size:11px;color:#4ade80">best '+bestScore+'</div></div>'
        +'<span style="font-size:14px;color:#3a4a60">'+(collapsed?"&#9660;":"&#9650;")+'</span>'
        +'</div>'+body+'</div>';
    });

    $("page-courses").innerHTML = html;
    $("page-courses").classList.add("active");
  }
}

// ── INSIGHT BUILDERS (compact) ────────────────────────────────────────────────
function ic(icon,title,body,tip){
  return '<div class="insight-card"><div class="insight-icon">'+icon+'</div><div style="flex:1"><div class="insight-title">'+title+'</div><div class="insight-body">'+body+'</div>'
    +(tip?'<div style="margin-top:7px;padding:7px 10px;background:#0a1628;border-left:3px solid #4a6eff;border-radius:0 6px 6px 0;font-size:12px;color:#a5b8ff;line-height:1.5">&#128161; '+tip+'</div>':"")
    +'</div></div>';
}

function buildOverallInsights(active){
  var n=active.length; if(!n) return'';
  var yrs=[...new Set(active.map(function(r){return r.year;}))].sort();
  var cards="";
  if(yrs.length>=2){
    var yrA=yrs.map(function(yr){var rs=active.filter(function(r){return r.year===yr;});return{yr:yr,avg:avg(rs.map(function(r){return r.strokes;})),n:rs.length};});
    var drop=(yrA[0].avg-yrA[yrA.length-1].avg).toFixed(1);
    cards+=ic("&#128200;",drop>0?drop+" stroke improvement since "+yrs[0]:"Scoring trend flat",yrA.map(function(y){return y.yr+": "+y.avg.toFixed(1);}).join(" \u2192 ")+". "+( drop>0?"Real progress across seasons.":"Focus on eliminating triples."),drop>0?"Keep doing what changed in "+yrs[yrs.length-1]+".":" Target reducing triples first.");
  }
  var trips=active.reduce(function(s,r){return s+r.trip;},0);
  var avgTrips=(trips/n).toFixed(2);
  cards+=ic("&#128308;","Triples averaging "+avgTrips+"/round \u2014 "+( trips*2)+" strokes lost","Each triple costs 2+ strokes vs a bogey. Converting one per round to a bogey saves ~2 shots &mdash; the single biggest lever at your level.","On trouble holes: lay up, pitch on, two-putt. A bogey is a win.");
  var f9a=avg(active.map(function(r){return r.f9;})).toFixed(1);
  var b9a=avg(active.map(function(r){return r.b9;})).toFixed(1);
  var stronger=parseFloat(f9a)<parseFloat(b9a)?"Front":"Back";
  cards+=ic("&#8596;",stronger+" 9 is your stronger half","F9 avg: "+f9a+" &middot; B9 avg: "+b9a+". "+( stronger==="Front"?"Back 9 fatigue or management breakdown is worth examining.":"You warm up well &mdash; carry that into the front."),stronger==="Front"?"Play conservatively on back 9 closing holes.":"Your back 9 strength is an asset &mdash; protect your front 9 starts.");
  var sorted=[...active].sort(function(a,b){return a.strokes-b.strokes;});
  var top=sorted.slice(0,10),bot=sorted.slice(-10);
  var topAvg=avg(top.map(function(r){return r.strokes;})).toFixed(1);
  var botAvg=avg(bot.map(function(r){return r.strokes;})).toFixed(1);
  cards+=ic("&#127942;","Best 10 avg "+topAvg+" &middot; Worst 10 avg "+botAvg,"Your ceiling is "+topAvg+" &mdash; that golf already exists. The gap between your best and worst is almost entirely explained by triple bogeys.","Your best golf is achievable consistently. Focus on floor not ceiling.");
  return cards;
}

function buildYearInsights(active,yr){
  var rs=active.filter(function(r){return r.year===yr;});
  if(!rs.length) return'<div style="color:#5a6a8a;padding:30px;text-align:center">No rounds for '+yr+'</div>';
  var n=rs.length;
  var avScore=avg(rs.map(function(r){return r.strokes;})).toFixed(1);
  var best=Math.min.apply(null,rs.map(function(r){return r.strokes;}));
  var worst=Math.max.apply(null,rs.map(function(r){return r.strokes;}));
  var totH=rs.reduce(function(s,r){return s+r.birdie+r.parH+r.bogey+r.dbl+r.trip;},0);
  var bPct=totH?Math.round(rs.reduce(function(s,r){return s+r.birdie;},0)/totH*100):0;
  var bogPct=totH?Math.round(rs.reduce(function(s,r){return s+r.bogey;},0)/totH*100):0;
  var dPct=totH?Math.round(rs.reduce(function(s,r){return s+r.dbl+r.trip;},0)/totH*100):0;
  var cards="";
  cards+=ic("&#128203;",yr+": "+n+" rounds &middot; avg "+avScore+" &middot; best "+best+" &middot; worst "+worst,"Score mix: Birdie "+bPct+"% &middot; Bogey "+bogPct+"% &middot; Doubles+ "+dPct+"%. "+(dPct>15?"Triples are the dominant issue this season.":"Solid mix."),null);
  if(n>=6){
    var sorted2=[...rs].sort(function(a,b){return a.date.localeCompare(b.date);});
    var h=Math.floor(n/2);
    var early=avg(sorted2.slice(0,h).map(function(r){return r.strokes;})).toFixed(1);
    var late=avg(sorted2.slice(h).map(function(r){return r.strokes;})).toFixed(1);
    var swing=(parseFloat(early)-parseFloat(late)).toFixed(1);
    cards+=ic("&#128202;","Within "+yr+": "+(swing>0?swing+" stroke improvement across season":"Trend flat"),"Early "+yr+" avg: "+early+" \u2192 Later: "+late+".",swing>0?"Carry this momentum into the next season.":"Try to play more consecutive rounds &mdash; the data shows you improve with frequency.");
  }
  var br=rs.reduce(function(b,r){return r.strokes<b.strokes?r:b;},rs[0]);
  cards+=ic("&#127942;","Best "+yr+" round: "+br.strokes+" at "+br.course.trim()+" ("+br.date+")",""+br.birdie+"B / "+br.parH+"P / "+br.bogey+"Bog / "+br.dbl+"Dbl / "+br.trip+"Trp. "+(br.trip===0?"Zero triples \u2014 that's the blueprint.":"Even with "+br.trip+" triple(s) you scored "+br.strokes+"."),null);
  return cards;
}

function buildCourseInsights(active,courseName){
  var rs=active.filter(function(r){return r.course.trim()===courseName;});
  if(!rs.length) return'<div style="color:#5a6a8a;padding:30px;text-align:center">No rounds at '+courseName+'</div>';
  var n=rs.length;
  var ci=CI[courseName]||CI[courseName.trim()]||{};
  var avScore=avg(rs.map(function(r){return r.strokes;})).toFixed(1);
  var best=Math.min.apply(null,rs.map(function(r){return r.strokes;}));
  var cards="";
  cards+=ic("&#128506;",courseName+" &mdash; "+n+" round"+(n!==1?"s":"")+" &middot; avg "+avScore+" &middot; best "+best,(ci.tee||"--")+" tees &middot; Rating "+(ci.rating||"--")+" &middot; Slope "+(ci.slope||"--")+(ci.yards?" &middot; "+(ci.yards||0).toLocaleString()+" yds":"")+".",null);
  var f9a=avg(rs.map(function(r){return r.f9;})).toFixed(1);
  var b9a=avg(rs.map(function(r){return r.b9;})).toFixed(1);
  var frontBetter=parseFloat(f9a)<parseFloat(b9a);
  cards+=ic("&#8596;","Here: F9 avg "+f9a+" &middot; B9 avg "+b9a,(frontBetter?"You score better on the front here by "+(parseFloat(b9a)-parseFloat(f9a)).toFixed(1)+" shots.":"You close stronger here."),frontBetter?"Play conservatively on the back 9.":"Use your back 9 strength as momentum.");
  var br=rs.reduce(function(b,r){return r.strokes<b.strokes?r:b;},rs[0]);
  cards+=ic("&#127942;","Blueprint round: "+best+" ("+br.date+")",""+br.birdie+"B / "+br.parH+"P / "+br.bogey+"Bog / "+br.dbl+"Dbl / "+br.trip+"Trp. "+(br.trip===0?"Zero triples &mdash; the blueprint.":"A clean card here is possible."),null);
  var avgTrips=avg(rs.map(function(r){return r.trip;})).toFixed(2);
  var gapToBest=(parseFloat(avScore)-best).toFixed(1);
  cards+=ic("&#127919;","Strategy for next round at "+courseName,"Your avg is "+avScore+", best is "+best+". Target: "+(best+1)+"-"+(best+3)+". The "+gapToBest+"-shot gap is almost entirely triples (avg "+avgTrips+"/round here).",
    "(1) Lay up on par 5s to a comfortable distance. (2) After a double, reset &mdash; don\\'t compound it. (3) "+(frontBetter?"If over "+parseFloat(f9a).toFixed(0)+" through 9, switch to damage-control mode on the back.":"Protect your back 9 strength &mdash; stay patient on the front."));

  // Hole-by-hole (verified courses only)
  var parsVerified = !!(COURSE_PARS[courseName]||COURSE_PARS[courseName.trim()]);
  if(!parsVerified||n<2){
    if(!parsVerified&&n>=2) cards+='<div style="background:#1a1200;border:1px solid #f59e0b44;border-radius:10px;padding:12px;margin-top:8px;font-size:12px;color:#d97706">&#9888; Hole-by-hole analysis suppressed &mdash; pars for this course are estimated, not verified.</div>';
    return cards;
  }
  var pars=getCoursePars(courseName);
  var chrono=[...rs].sort(function(a,b){return a.date.localeCompare(b.date);});
  var holeStats=pars.map(function(par,hi){
    var scores=chrono.map(function(r){return(r.scores&&r.scores[hi]>0)?r.scores[hi]:null;}).filter(function(v){return v!==null;});
    if(!scores.length)return{hi:hi,par:par,avg:null,diff:null,trend:null,scores:[]};
    var hAvg=avg(scores);
    var diff=hAvg-par;
    var trend=null;
    if(scores.length>=3){var mid=Math.ceil(scores.length/2);trend=avg(scores.slice(0,mid))-avg(scores.slice(-mid));}
    return{hi:hi,par:par,avg:hAvg,diff:diff,trend:trend,scores:scores};
  });
  var played=holeStats.filter(function(h){return h.avg!==null;});
  var trouble=[...played].sort(function(a,b){return b.diff-a.diff;}).slice(0,3);
  var improving=played.filter(function(h){return h.trend!==null&&h.trend>=0.3;});
  var worsening=played.filter(function(h){return h.trend!==null&&h.trend<=-0.3;});
  function holeCell(h){
    if(!h.avg)return'<div style="text-align:center;opacity:0.3"><div style="font-size:10px;color:#5a6a8a">'+(h.hi+1)+'</div><div style="font-size:9px;color:#3a4a60">p'+h.par+'</div><div style="width:32px;height:32px;border-radius:7px;background:#1c2234;margin:0 auto"></div><div style="height:12px"></div></div>';
    var d=h.diff;
    var bg=d>1.5?"#7f1d1d":d>0.7?"#b91c1c":d>0.2?"#c2410c":d>-0.2?"#1d4ed8":d>-0.7?"#15803d":"#166534";
    var arrow=h.trend===null?"":h.trend>=0.3?"&#9650;":h.trend<=-0.3?"&#9660;":"";
    var arrowCol=h.trend>0?"#4ade80":"#f87171";
    return'<div style="text-align:center">'
      +'<div style="font-size:10px;color:#5a6a8a;font-weight:600">'+(h.hi+1)+'</div>'
      +'<div style="font-size:9px;color:#3a4a60">p'+h.par+'</div>'
      +'<div style="width:32px;height:32px;border-radius:7px;background:'+bg+';display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#fff;margin:2px auto">'+h.avg.toFixed(1)+'</div>'
      +'<div style="font-size:11px;color:'+(d>=0?"#f87171":"#4ade80")+'">'+( d>=0?"+":"")+d.toFixed(1)+'</div>'
      +(arrow?'<div style="font-size:10px;color:'+arrowCol+'">'+arrow+'</div>':'<div style="height:14px"></div>')
      +'</div>';
  }
  var heatHtml='<div class="sl" style="margin-top:16px">Hole-by-Hole at '+courseName+'</div>'
    +'<div style="font-size:11px;color:#5a6a8a;margin-bottom:8px">Avg score per hole &middot; &#9650; improving &#9660; worsening across visits</div>'
    +'<div style="background:#0d1120;border:1px solid #1c2234;border-radius:12px;padding:12px;margin-bottom:10px">'
    +'<div style="font-size:10px;font-weight:700;color:#5a6a8a;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px">Front 9</div>'
    +'<div style="display:flex;justify-content:space-around">'+holeStats.slice(0,9).map(holeCell).join("")+'</div>'
    +'<div style="border-top:1px solid #1c2234;margin:8px 0"></div>'
    +'<div style="font-size:10px;font-weight:700;color:#5a6a8a;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px">Back 9</div>'
    +'<div style="display:flex;justify-content:space-around">'+holeStats.slice(9).map(holeCell).join("")+'</div>'
    +'<div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;padding-top:8px;border-top:1px solid #1c2234;font-size:10px;color:#5a6a8a">'
    +'<span>Dark green: &#8804;-0.7</span><span>Green: -0.2 to -0.7</span><span>Blue: &asymp; par</span><span>Orange: 0.2-0.7</span><span>Red: &gt;0.7</span>'
    +'</div></div>';
  if(trouble.length) heatHtml+='<div style="background:#1a0a0a;border:1px solid #7f1d1d44;border-radius:10px;padding:12px;margin-bottom:8px"><div style="font-size:12px;font-weight:700;color:#f87171;margin-bottom:6px">&#128308; Biggest trouble holes</div>'+trouble.map(function(h){return'<div style="font-size:12px;color:#e8ecf4;margin-bottom:3px">Hole '+(h.hi+1)+' (par '+h.par+') &mdash; avg '+h.avg.toFixed(1)+' (+'+h.diff.toFixed(1)+')</div>';}).join("")+'<div style="font-size:11px;color:#7a3030;margin-top:6px">Strategy: play for bogey. Tee club down, aim to centre, pitch &amp; two-putt.</div></div>';
  if(worsening.length) heatHtml+='<div style="background:#0a0a1a;border:1px solid #f8717144;border-radius:10px;padding:12px;margin-bottom:8px"><div style="font-size:12px;font-weight:700;color:#f87171;margin-bottom:6px">&#128200; Getting worse across visits</div>'+worsening.slice(0,3).map(function(h){return'<div style="font-size:12px;color:#e8ecf4;margin-bottom:3px">Hole '+(h.hi+1)+' (par '+h.par+') &mdash; now avg '+h.avg.toFixed(1)+'</div>';}).join("")+'</div>';
  if(improving.length) heatHtml+='<div style="background:#0a1a0a;border:1px solid #4ade8044;border-radius:10px;padding:12px;margin-bottom:8px"><div style="font-size:12px;font-weight:700;color:#4ade80;margin-bottom:6px">&#128201; Getting better across visits</div>'+improving.slice(0,3).map(function(h){return'<div style="font-size:12px;color:#e8ecf4;margin-bottom:3px">Hole '+(h.hi+1)+' (par '+h.par+') &mdash; now avg '+h.avg.toFixed(1)+'</div>';}).join("")+'</div>';
  return cards + heatHtml;
}

window.addEventListener("load", render);
window.addEventListener("resize", function(){ if(S.tab==="yearly") render(); });
